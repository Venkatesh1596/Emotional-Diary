{% extends "base.html" %}
{% block title %}Home{% endblock %}

{% block content %}

<div class="card p-4">

<!-- Voice Buttons -->
<div class="mb-3">

<button onclick="startVoice()" class="btn btn-success">
🎤 Start Voice Diary
</button>

<button onclick="stopVoice()" class="btn btn-danger">
⏹ Stop
</button>

<p id="voiceStatus" class="mt-2 text-muted">Voice stopped</p>

</div>

<form action="{{ url_for('save_diary') }}" method="POST">

<div class="mb-3">
<input type="text" name="title" class="form-control"
placeholder="Diary Title" required>
</div>

<div class="mb-3">
<textarea id="diaryText" name="content" class="form-control"
placeholder="How are you feeling today?" rows="5" required></textarea>
</div>

<button class="btn btn-primary w-100">Save Entry</button>

</form>

</div>

<script>

let recognition;
let isListening = false;

function startVoice(){

if (!('webkitSpeechRecognition' in window)) {
alert("Speech recognition not supported. Please use Google Chrome.");
return;
}

recognition = new webkitSpeechRecognition();

recognition.lang = "en-US";
recognition.continuous = true;
recognition.interimResults = false;   // IMPORTANT FIX

recognition.onstart = function(){
isListening = true;
document.getElementById("voiceStatus").innerText = "🎙 Listening...";
};

recognition.onresult = function(event){

let textarea = document.getElementById("diaryText");

let speechResult = event.results[event.results.length - 1][0].transcript;

textarea.value += " " + speechResult;

};

recognition.onend = function(){
if(isListening){
recognition.start();
}
};

recognition.start();
}

function stopVoice(){

if(recognition){
recognition.stop();
isListening = false;
document.getElementById("voiceStatus").innerText = "🛑 Voice stopped";
}

}

</script>

{% endblock %}
